async function chargerParallele() {
  console.time(&quot;parallèle&quot;);

  const [userRep, postsRep, albumsRep] = await Promise.all([
    fetch(&quot;https://jsonplaceholder.typicode.com/users/1&quot;),
    fetch(&quot;https://jsonplaceholder.typicode.com/posts?userId=1&quot;),
    fetch(&quot;https://jsonplaceholder.typicode.com/albums?userId=1&quot;)
  ]);

    userRep.json(),
    postsRep.json(),
    albumsRep.json()
  ]);

<h3>🎯 Mini-défi — Fetch avec retry automatique</h3>
<h4>Énoncé</h4>
<p>Crée une fonction <code>fetchAvecRetry(url, options, maxTentatives)</code> qui :</p>
<ul>
<li>Réessaie automatiquement en cas d'échec réseau ou d'erreur HTTP >= 500</li>
<li>Attend de plus en plus longtemps entre les tentatives : 1s, 2s, 4s (backoff exponentiel)</li>
<li>N'essaie <strong>pas</strong> de réessayer pour les erreurs 4xx (400, 401, 404...) qui sont des erreurs du client</li>
<li>Lance une erreur finale si toutes les tentatives échouent en indiquant le nombre de tentatives</li>
</ul>
<h4>Solution</h4>
<pre><code>async function fetchAvecRetry(url, options = {}, maxTentatives = 3) {
  let dernierErreur;

  for (let tentative = 1; tentative &lt;= maxTentatives; tentative++) {
    try {
      console.log(`Tentative ${tentative}/${maxTentatives}...`);
      const reponse = await fetch(url, options);

      // Ne pas réessayer les erreurs 4xx — c&#x27;est une erreur du client
      if (reponse.status &gt;= 400 &amp;&amp; reponse.status &lt; 500) {
        throw new Error(`Erreur client ${reponse.status} — pas de retry`);
      }

      if (!reponse.ok) {
        throw new Error(`HTTP ${reponse.status}`);
      }

      return reponse.json(); // ✅ Succès !

    } catch (err) {
      // Ne pas réessayer les erreurs 4xx
      if (err.message.includes(&quot;pas de retry&quot;)) throw err;

      dernierErreur = err;
      console.warn(`Échec tentative ${tentative}: ${err.message}`);

      if (tentative &lt; maxTentatives) {
        const attente = 1000 * Math.pow(2, tentative - 1); // 1s, 2s, 4s
        console.log(`Nouvel essai dans ${attente}ms...`);
        await new Promise(resolve =&gt; setTimeout(resolve, attente));
      }
    }
  }

  throw new Error(
    `Échec après ${maxTentatives} tentatives. Dernière erreur : ${dernierErreur.message}`
  );
}

// Utilisation
try {
  const data = await fetchAvecRetry(&quot;https://api.example.com/data&quot;);
  console.log(data);
} catch (err) {
  console.error(err.message);
}</code></pre>

<script type="application/json" id="m14"><h2>📘 MODULE 14 — Classes & Prototypes</h2>
<blockquote><strong>Objectif du module :</strong> Comprendre la programmation orientée objet en JavaScript : le système de prototypes, les classes ES6, l'héritage, l'encapsulation avec les champs privés <code>#</code>, et les patterns avancés.</blockquote>
<h2>Fiche 14.1 — Les Prototypes</h2>
<h3>🔍 Comment fonctionne l'héritage en JS ?</h3>
<p>JavaScript est un langage à <strong>héritage prototypal</strong>. Contrairement à Java ou Python qui utilisent des classes "vraies", en JavaScript chaque objet possède une propriété interne cachée <code>[[Prototype]]</code> qui pointe vers un autre objet (son prototype). Quand on accède à une propriété sur un objet, JavaScript la cherche d'abord sur l'objet lui-même, puis remonte la <strong>chaîne de prototypes</strong> jusqu'à la trouver — ou retourne <code>undefined</code> si elle est introuvable.</p>
<h3>📌 La chaîne de prototypes</h3>
<pre><code>const animal = {
  respirer() {
    console.log(&quot;Je respire&quot;);
  }
};

const chien = {
  aboyer() {
    console.log(&quot;Woof !&quot;);
  }
};

// Définir le prototype de chien → chien hérite de animal
Object.setPrototypeOf(chien, animal);

chien.aboyer();   // &quot;Woof !&quot; — méthode propre à chien
chien.respirer(); // &quot;Je respire&quot; — héritée du prototype animal !

// Vérifier
console.log(Object.getPrototypeOf(chien) === animal); // true
console.log(chien.hasOwnProperty(&quot;aboyer&quot;));   // true — propre
console.log(chien.hasOwnProperty(&quot;respirer&quot;)); // false — héritée !</code></pre>
<h3>📌 Object.create() — Créer un objet avec un prototype précis</h3>
<p><code>Object.create(proto)</code> crée un nouvel objet dont le prototype est <code>proto</code>. C'est la façon la plus explicite de mettre en place l'héritage prototypal.</p>
<pre><code>const vehicule = {
  demarrer() { console.log(`${this.marque} démarre`); },
  arreter()  { console.log(`${this.marque} s&#x27;arrête`); }
};

// voiture hérite de vehicule
const voiture = Object.create(vehicule);
voiture.marque = &quot;Toyota&quot;;
voiture.roues  = 4;

voiture.demarrer(); // &quot;Toyota démarre&quot; — méthode héritée
voiture.arreter();  // &quot;Toyota s&#x27;arrête&quot;</code></pre>
<h3>📌 Le prototype des fonctions constructeurs (syntaxe pré-ES6)</h3>
<p>Avant l'arrivée des classes ES6, on créait des objets avec des <strong>fonctions constructeurs</strong> appelées avec <code>new</code>. Les méthodes étaient placées sur le <code>.prototype</code> pour être partagées entre toutes les instances — économisant ainsi la mémoire.</p>
<pre><code>function Animal(nom, son) {
  this.nom = nom; // Propriétés propres à chaque instance
  this.son = son;
}

// Méthodes placées sur le prototype — partagées par toutes les instances
Animal.prototype.parler = function() {
  console.log(`${this.nom} fait ${this.son}`);
};

const chat  = new Animal(&quot;Miaou&quot;, &quot;miaou&quot;);
const chien = new Animal(&quot;Rex&quot;,   &quot;woof&quot;);

chat.parler();  // &quot;Miaou fait miaou&quot;
chien.parler(); // &quot;Rex fait woof&quot;

// Les deux instances partagent la MÊME fonction parler
console.log(chat.parler === chien.parler); // true — économie mémoire !</code></pre>
<blockquote>💡 Les classes ES6 (fiche suivante) utilisent exactement le même mécanisme sous le capot — c'est juste une syntaxe plus lisible.</blockquote>
<h2>Fiche 14.2 — Les Classes ES6</h2>
<h3>🔍 Classes : un sucre syntaxique sur les prototypes</h3>
<p>Les classes ES6 ne changent <strong>pas</strong> le système de prototypes de JavaScript — elles offrent une <strong>syntaxe plus claire et plus familière</strong> pour les développeurs venant d'autres langages. Sous le capot, une classe est une fonction et ses méthodes sont placées sur le prototype.</p>
<h3>📌 Syntaxe complète d'une classe</h3>
<pre><code>class Animal {
  // Constructeur — appelé automatiquement avec new
  constructor(nom, son) {
    this.nom = nom;
    this.son = son;
  }

  // Méthode d&#x27;instance — placée sur le prototype, partagée par toutes les instances
  parler() {
    console.log(`${this.nom} fait ${this.son}`);
  }

  // Méthode statique — appartient à la classe elle-même, pas aux instances
  // Appelée avec Animal.creerMuet() et non chat.creerMuet()
  static creerMuet(nom) {
    return new Animal(nom, &quot;...&quot;);
  }

  // Getter — s&#x27;utilise comme une propriété (sans parenthèses)
  get description() {
    return `${this.nom} (${this.son})`;
  }

  // Setter — s&#x27;utilise comme une propriété lors de l&#x27;affectation
  set nouveauNom(valeur) {
    if (typeof valeur !== &quot;string&quot;) throw new Error(&quot;Doit être une string&quot;);
    this.nom = valeur;
  }

  // toString — appelé automatiquement lors de conversions en string
  toString() {
    return `Animal(${this.nom})`;
  }
}

// Utilisation
const chat = new Animal(&quot;Minou&quot;, &quot;miaou&quot;);
chat.parler();                 // &quot;Minou fait miaou&quot;
console.log(chat.description); // &quot;Minou (miaou)&quot; — getter
console.log(`${chat}`);        // &quot;Animal(Minou)&quot; — toString automatique
chat.nouveauNom = &quot;Tigrou&quot;;    // setter

// Méthode statique — sur la classe, pas l&#x27;instance
const muet = Animal.creerMuet(&quot;Poisson&quot;);
muet.parler(); // &quot;Poisson fait ...&quot;

// instanceof — vérifie si un objet est une instance d&#x27;une classe
console.log(chat instanceof Animal); // true</code></pre>
<h2>Fiche 14.3 — L'héritage avec <code>extends</code></h2>
<h3>🔍 Hériter d'une classe parent</h3>
<p>Le mot-clé <code>extends</code> permet à une classe d'<strong>hériter</strong> de toutes les propriétés et méthodes d'une autre classe. La classe enfant peut ensuite ajouter ses propres méthodes ou <strong>surcharger</strong> (override) les méthodes du parent.</p>
<h3>📌 extends et super</h3>
<pre><code>class Animal {
  constructor(nom) {
    this.nom   = nom;
    this.vivant = true;
  }

  parler() {
    console.log(`${this.nom} parle`);
  }

  toString() {
    return `Animal(${this.nom})`;
  }
}

class Chien extends Animal {
  constructor(nom, race) {
    super(nom); // ⚠️ OBLIGATOIRE — doit être appelé AVANT d&#x27;accéder à this
    this.race = race;
  }

  // Override — remplace la méthode du parent
  parler() {
    console.log(`${this.nom} aboie : Woof !`);
  }

  // Méthode spécifique à Chien
  rapporter() {
    console.log(`${this.nom} rapporte la balle !`);
  }

  toString() {
    return `Chien(${this.nom}, ${this.race})`;
  }
}

const rex = new Chien(&quot;Rex&quot;, &quot;Labrador&quot;);
rex.parler();    // &quot;Rex aboie : Woof !&quot; — méthode surchargée
rex.rapporter(); // &quot;Rex rapporte la balle !&quot; — méthode propre

// instanceof vérifie toute la chaîne d&#x27;héritage
console.log(rex instanceof Chien);  // true
console.log(rex instanceof Animal); // true — aussi !
console.log(`${rex}`);              // &quot;Chien(Rex, Labrador)&quot;</code></pre>
<h3>📌 Appeler la méthode parent avec super.methode()</h3>
<p><code>super.methode()</code> permet d'appeler la version de la méthode définie dans la classe parent, utile quand on veut <strong>étendre</strong> le comportement plutôt que le remplacer complètement.</p>
<pre><code>class Forme {
  constructor(couleur) { this.couleur = couleur; }
  decrire() { return `Forme ${this.couleur}`; }
}

class Cercle extends Forme {
  constructor(couleur, rayon) {
    super(couleur); // Appelle le constructeur de Forme
    this.rayon = rayon;
  }

  // Étend la méthode du parent au lieu de la remplacer entièrement
  decrire() {
    const descParent = super.decrire(); // &quot;Forme rouge&quot;
    return `${descParent}, cercle de rayon ${this.rayon}`;
    // &quot;Forme rouge, cercle de rayon 5&quot;
  }

  aire() { return Math.PI * this.rayon ** 2; }
}

const c = new Cercle(&quot;rouge&quot;, 5);
console.log(c.decrire());         // &quot;Forme rouge, cercle de rayon 5&quot;
console.log(c.aire().toFixed(2)); // &quot;78.54&quot;</code></pre>
<h2>Fiche 14.4 — Encapsulation : champs privés <code>#</code></h2>
<h3>🔍 Pourquoi l'encapsulation ?</h3>
<p>L'encapsulation consiste à <strong>cacher les détails internes</strong> d'un objet et à n'exposer que ce qui est nécessaire via une interface publique contrôlée. Cela empêche la modification accidentelle ou malveillante de l'état interne, et permet de changer l'implémentation sans casser le code qui utilise la classe.</p>
<p>Jusqu'à ES2022, on utilisait la convention <code>_propriete</code> (underscore) pour indiquer qu'une propriété était "privée", mais elle restait techniquement accessible. Les champs <code>#</code> introduits en ES2022 sont <strong>vraiment privés</strong> au niveau du moteur JavaScript.</p>
<h3>📌 Champs privés avec #</h3>
<pre><code>class CompteBancaire {
  // Déclaration des champs privés en haut de la classe (obligatoire)
  #solde;
  #historique = [];
  #proprietaire;

  constructor(proprietaire, soldeInitial = 0) {
    this.#proprietaire = proprietaire;
    this.#solde = soldeInitial;
  }

  deposer(montant) {
    if (montant &lt;= 0) throw new Error(&quot;Le montant doit être positif&quot;);
    this.#solde += montant;
    this.#historique.push({ type: &quot;dépôt&quot;, montant, date: new Date() });
    return this; // Permet le chaînage de méthodes
  }

  retirer(montant) {
    if (montant &lt;= 0) throw new Error(&quot;Le montant doit être positif&quot;);
    if (montant &gt; this.#solde) throw new Error(&quot;Solde insuffisant&quot;);
    this.#solde -= montant;
    this.#historique.push({ type: &quot;retrait&quot;, montant, date: new Date() });
    return this;
  }

  // Getters — accès contrôlé (lecture seule) aux données privées
  get solde()       { return this.#solde; }
  get proprietaire(){ return this.#proprietaire; }
  get historique()  { return [...this.#historique]; } // Copie défensive !

  toString() {
    return `Compte de ${this.#proprietaire} — Solde : ${this.#solde}€`;
  }
}

const compte = new CompteBancaire(&quot;Alice&quot;, 100);
compte.deposer(50).retirer(30); // Chaînage grâce au return this
console.log(compte.solde);       // 120 ✅

console.log(compte.#solde); // ❌ SyntaxError — vraiment privé !</code></pre>
<h3>📌 Méthodes privées</h3>
<p>Les méthodes privées sont utiles pour décomposer la logique interne sans l'exposer publiquement.</p>
<pre><code>class Validateur {
  // Méthodes privées — utilitaires internes
  #verifierLongueur(valeur, min, max) {
    return valeur.length &gt;= min &amp;&amp; valeur.length &lt;= max;
  }

  #verifierFormat(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  // Seule méthode publique — utilise les méthodes privées
  validerInscription({ prenom, email, motDePasse }) {
    const erreurs = [];

    if (!this.#verifierLongueur(prenom, 2, 50)) {
      erreurs.push(&quot;Prénom : entre 2 et 50 caractères&quot;);
    }
    if (!this.#verifierFormat(email)) {
      erreurs.push(&quot;Email invalide&quot;);
    }
    if (!this.#verifierLongueur(motDePasse, 8, 100)) {
      erreurs.push(&quot;Mot de passe : au moins 8 caractères&quot;);
    }

    return { valide: erreurs.length === 0, erreurs };
  }
}

const v = new Validateur();
console.log(v.validerInscription({
  prenom: &quot;Al&quot;,
  email: &quot;pas-un-email&quot;,
  motDePasse: &quot;court&quot;
}));
// { valide: false, erreurs: [&quot;Prénom...&quot;, &quot;Email invalide&quot;, &quot;Mot de passe...&quot;] }</code></pre>
<h2>Fiche 14.5 — Propriétés et méthodes statiques</h2>
<h3>🔍 static : appartient à la classe, pas aux instances</h3>
<p>Les membres <code>static</code> appartiennent à la <strong>classe elle-même</strong> et non aux instances créées avec <code>new</code>. Ils sont utiles pour les compteurs, les usines (factory methods), les utilitaires ou les registres d'instances.</p>
<pre><code>class Compteur {
  static #total = 0;         // Propriété statique privée
  static instances = [];     // Propriété statique publique

  #id;
  #nom;

  constructor(nom) {
    Compteur.#total++;          // Incrémente le compteur global
    this.#id  = Compteur.#total;
    this.#nom = nom;
    Compteur.instances.push(this);
  }

  // Méthodes statiques — appelées sur la classe
  static getTotalCrees()  { return Compteur.#total; }
  static reinitialiser()  { Compteur.#total = 0; Compteur.instances = []; }

  // Méthodes d&#x27;instance — appelées sur les objets
  get id()  { return this.#id; }
  get nom() { return this.#nom; }
  toString() { return `Compteur#${this.#id}(${this.#nom})`; }
}

const a = new Compteur(&quot;alpha&quot;);
const b = new Compteur(&quot;beta&quot;);
const c = new Compteur(&quot;gamma&quot;);

console.log(Compteur.getTotalCrees()); // 3
console.log(Compteur.instances.map(i =&gt; i.nom)); // [&quot;alpha&quot;, &quot;beta&quot;, &quot;gamma&quot;]

Compteur.reinitialiser();
console.log(Compteur.getTotalCrees()); // 0</code></pre>
<h2>Fiche 14.6 — Mixins et composition</h2>
<h3>🔍 Le problème : l'héritage multiple</h3>
<p>JavaScript ne supporte pas l'héritage multiple (une classe ne peut hériter que d'<strong>une seule</strong> autre classe). Mais parfois, on veut partager des comportements entre plusieurs classes non liées hiérarchiquement. Les <strong>mixins</strong> résolvent ce problème.</p>
<p>Un mixin est une <strong>fonction qui prend une classe et retourne une nouvelle classe étendue</strong> avec des méthodes supplémentaires. On peut composer plusieurs mixins ensemble.</p>
<h3>📌 Pattern Mixin</h3>
<pre><code>// Chaque mixin est une fonction qui étend une classe de base
const Serialisable = (Base) =&gt; class extends Base {
  toJSON() { return JSON.stringify(this); }

  static fromJSON(json) {
    return Object.assign(new this(), JSON.parse(json));
  }
};

const Horodatable = (Base) =&gt; class extends Base {
  #creeLe   = new Date();
  #modifieLe = new Date();

  get creeLe()    { return this.#creeLe; }
  get modifieLe() { return this.#modifieLe; }

  marquerModifie() { this.#modifieLe = new Date(); return this; }
};

const Validable = (Base) =&gt; class extends Base {
  #erreurs = [];

  get estValide() { return this.#erreurs.length === 0; }
  get erreurs()   { return [...this.#erreurs]; }

  ajouterErreur(msg)    { this.#erreurs.push(msg); return this; }
  reinitialiserErreurs(){ this.#erreurs = []; return this; }
};

// Composer plusieurs mixins sur une classe
// On lit de droite à gauche : Validable → Horodatable → Serialisable
class Utilisateur extends Serialisable(Horodatable(Validable(class {}))) {
  #nom;
  #email;

  constructor(nom, email) {
    super();
    this.#nom   = nom;
    this.#email = email;
  }

  get nom()   { return this.#nom; }
  get email() { return this.#email; }

  valider() {
    this.reinitialiserErreurs();
    if (this.#nom.length &lt; 2)       this.ajouterErreur(&quot;Nom trop court&quot;);
    if (!this.#email.includes(&quot;@&quot;)) this.ajouterErreur(&quot;Email invalide&quot;);
    return this;
  }
}

const user = new Utilisateur(&quot;Alice&quot;, &quot;alice@example.com&quot;);
user.valider();
console.log(user.estValide);  // true
console.log(user.creeLe);     // Date de création
console.log(user.toJSON());   // Sérialisation JSON</code></pre>

<h3>Exercice 14.1 — Classe Produit avec encapsulation</h3>
<h4>Énoncé</h4>
<p>Crée une classe <code>Produit</code> qui représente un produit dans un catalogue e-commerce :</p>
<ul>
<li>Propriétés privées : <code>#nom</code>, <code>#prix</code>, <code>#stock</code></li>
<li>Constructeur : <code>(nom, prix, stock = 0)</code> — le prix ne peut pas être négatif (lève une erreur sinon)</li>
<li>Méthode <code>approvisionner(quantite)</code> : ajoute au stock, lève une erreur si la quantité est invalide (≤ 0)</li>
<li>Méthode <code>vendre(quantite)</code> : retire du stock, lève une erreur si le stock est insuffisant</li>
<li>Méthode <code>appliquerReduction(pourcentage)</code> : réduit le prix d'un pourcentage donné entre 0 et 100</li>
<li>Les trois méthodes retournent <code>this</code> pour permettre le <strong>chaînage</strong></li>
<li>Getters publics : <code>nom</code>, <code>prix</code>, <code>stock</code>, <code>disponible</code> (true si stock > 0)</li>
<li>Méthode statique <code>comparer(p1, p2)</code> : utilisable directement avec <code>Array.sort()</code> pour trier par prix</li>
<li>Méthode <code>toString()</code> qui affiche nom, prix et stock</li>
</ul>
<h4>Solution</h4>
<pre><code>class Produit {
  #nom;
  #prix;
  #stock;

  constructor(nom, prix, stock = 0) {
    if (prix &lt; 0) throw new Error(&quot;Le prix ne peut pas être négatif&quot;);
    this.#nom   = nom;
    this.#prix  = prix;
    this.#stock = stock;
  }

  approvisionner(quantite) {
    if (quantite &lt;= 0) throw new Error(&quot;Quantité invalide&quot;);
    this.#stock += quantite;
    return this;
  }

  vendre(quantite) {
    if (quantite &lt;= 0) throw new Error(&quot;Quantité invalide&quot;);
    if (quantite &gt; this.#stock) throw new Error(&quot;Stock insuffisant&quot;);
    this.#stock -= quantite;
    return this;
  }

  appliquerReduction(pourcentage) {
    if (pourcentage &lt; 0 || pourcentage &gt; 100) throw new Error(&quot;Pourcentage invalide&quot;);
    this.#prix = this.#prix * (1 - pourcentage / 100);
    return this;
  }

  get nom()        { return this.#nom; }
  get prix()       { return this.#prix; }
  get stock()      { return this.#stock; }
  get disponible() { return this.#stock &gt; 0; }

  static comparer(p1, p2) { return p1.prix - p2.prix; }

  toString() {
    return `${this.#nom} — ${this.#prix.toFixed(2)}€ (stock: ${this.#stock})`;
  }
}

// Test
const laptop = new Produit(&quot;Laptop&quot;, 999, 5);
const souris  = new Produit(&quot;Souris&quot;, 29, 20);
const clavier = new Produit(&quot;Clavier&quot;, 79, 0);

laptop.approvisionner(3).appliquerReduction(10);
console.log(`${laptop}`); // &quot;Laptop — 899.10€ (stock: 8)&quot;
laptop.vendre(2);
console.log(laptop.disponible); // true

const produits = [laptop, souris, clavier];
produits.sort(Produit.comparer);
produits.forEach(p =&gt; console.log(`${p}`));
// Clavier, Souris, Laptop (ordre croissant par prix)</code></pre>

<h4>Énoncé</h4>

</ul>
<p>Crée ensuite un tableau contenant un Rectangle, un Cercle et un Carré, et affiche les informations de chacun.</p>
<h4>Solution</h4>
<pre><code>class Forme {
  #couleur;

  constructor(couleur = &quot;noir&quot;) {

    if (new.target === Forme) {

  aire()      { throw new Error(`${this.constructor.name} doit implémenter aire()`); }
  perimetre() { throw new Error(`${this.constructor.name} doit implémenter perimetre()`); }

  toString() {
    return `${this.constructor.name}(${this.#couleur}) — Aire: ${this.aire().toFixed(2)}`;
  }

class Rectangle extends Forme {

  #hauteur;

  constructor(largeur, hauteur, couleur) {

    this.#hauteur = hauteur;

  get hauteur() { return this.#hauteur; }

  aire()      { return this.#largeur * this.#hauteur; }
  perimetre() { return 2 * (this.#largeur + this.#hauteur); }

<h3>Exercice 14.3 — Méthodes statiques : classe Fraction</h3>
<h4>Énoncé</h4>
<p>Crée une classe <code>Fraction</code> qui représente une fraction mathématique :</p>
<ul>
<li>Propriétés privées <code>#numerateur</code> et <code>#denominateur</code></li>
<li>Le constructeur réduit automatiquement la fraction à sa forme irréductible (ex: 4/8 → 1/2). Lève une erreur si le dénominateur est 0.</li>
<li>Méthodes d'instance : <code>ajouter(autre)</code>, <code>multiplier(autre)</code>, <code>valeur()</code> (la valeur décimale), <code>toString()</code> (ex: "3/4")</li>
<li>Méthodes statiques : <code>Fraction.pgcd(a, b)</code> pour le plus grand commun diviseur, <code>Fraction.fromString("3/4")</code> pour créer une Fraction depuis une string</li>
</ul>
<h4>Solution</h4>
<pre><code>class Fraction {
  #numerateur;
  #denominateur;

  constructor(numerateur, denominateur = 1) {
    if (denominateur === 0) throw new Error(&quot;Dénominateur nul impossible&quot;);

    // Normaliser le signe (signe toujours sur le numérateur)
    const signe = denominateur &lt; 0 ? -1 : 1;
    const pgcd  = Fraction.pgcd(Math.abs(numerateur), Math.abs(denominateur));

    this.#numerateur   = signe * numerateur / pgcd;
    this.#denominateur = Math.abs(denominateur) / pgcd;
  }

  // Algorithme d&#x27;Euclide pour le PGCD
  static pgcd(a, b) {
    return b === 0 ? a : Fraction.pgcd(b, a % b);
  }

  static fromString(str) {
    const [num, den] = str.split(&quot;/&quot;).map(Number);
    return new Fraction(num, den ?? 1);
  }

  ajouter(autre) {
    return new Fraction(
      this.#numerateur * autre.#denominateur + autre.#numerateur * this.#denominateur,
      this.#denominateur * autre.#denominateur
    );
  }

  multiplier(autre) {
    return new Fraction(
      this.#numerateur * autre.#numerateur,
      this.#denominateur * autre.#denominateur
    );
  }

  valeur()    { return this.#numerateur / this.#denominateur; }
  toString()  { return `${this.#numerateur}/${this.#denominateur}`; }
}

// Test
const a = new Fraction(1, 2);
const b = new Fraction(1, 3);

console.log(`${a.ajouter(b)}`);   // &quot;5/6&quot;
console.log(`${a.multiplier(b)}`); // &quot;1/6&quot;

const c = new Fraction(4, 8);
console.log(`${c}`); // &quot;1/2&quot; — réduit automatiquement

const d = Fraction.fromString(&quot;3/4&quot;);
console.log(d.valeur()); // 0.75</code></pre>
<h3>🎯 Mini-défi — Patron Observer : EventEmitter</h3>
<h4>Énoncé</h4>
<p>Implémente la classe <code>EventEmitter</code> qui réalise le <strong>patron de conception Observer</strong>. Elle doit permettre de :</p>
<ul>
<li>S'abonner à un évènement avec <code>.on(evenement, callback)</code> — plusieurs callbacks par évènement</li>
<li>Se désabonner avec <code>.off(evenement, callback)</code></li>
<li>S'abonner pour <strong>une seule exécution</strong> avec <code>.once(evenement, callback)</code> — se désabonne automatiquement après</li>
<li>Émettre un évènement avec <code>.emit(evenement, ...args)</code> — appelle tous les callbacks abonnés avec les arguments</li>
<li>Les méthodes retournent <code>this</code> pour permettre le chaînage</li>
</ul>
<p>Ensuite, crée une classe <code>Boutique</code> qui hérite de <code>EventEmitter</code> et émet des évènements "ajout", "vente" et "erreur".</p>
<h4>Solution</h4>
<pre><code>class EventEmitter {
  #listeners = new Map();

  on(evenement, callback) {
    if (!this.#listeners.has(evenement)) {
      this.#listeners.set(evenement, new Set());
    }
    this.#listeners.get(evenement).add(callback);
    return this; // Chaînage
  }

  off(evenement, callback) {
    this.#listeners.get(evenement)?.delete(callback);
    return this;
  }

  once(evenement, callback) {
    // Wrapper qui se désabonne automatiquement après la première exécution
    const wrapper = (...args) =&gt; {
      callback(...args);
      this.off(evenement, wrapper);
    };
    return this.on(evenement, wrapper);
  }

  emit(evenement, ...args) {
    this.#listeners.get(evenement)?.forEach(cb =&gt; cb(...args));
    return this;
  }
}

// Utilisation
class Boutique extends EventEmitter {
  #produits = [];

  ajouter(produit) {
    this.#produits.push(produit);
    this.emit(&quot;ajout&quot;, produit);
    return this;
  }

  vendre(nom) {
    const idx = this.#produits.findIndex(p =&gt; p.nom === nom);
    if (idx === -1) {
      this.emit(&quot;erreur&quot;, `${nom} introuvable`);
      return this;
    }
    const [vendu] = this.#produits.splice(idx, 1);
    this.emit(&quot;vente&quot;, vendu);
    return this;
  }

  get stock() { return this.#produits.length; }
}

const boutique = new Boutique();
boutique
  .on(&quot;ajout&quot;,  p   =&gt; console.log(`+ Ajouté : ${p.nom} (${p.prix}€)`))
  .on(&quot;vente&quot;,  p   =&gt; console.log(`- Vendu  : ${p.nom}`))
  .on(&quot;erreur&quot;, msg =&gt; console.log(`❌ Erreur : ${msg}`))
  .once(&quot;ajout&quot;, p  =&gt; console.log(`🎉 Premier ajout : ${p.nom} !`));

boutique.ajouter({ nom: &quot;Laptop&quot;,  prix: 999 });
// &quot;+ Ajouté : Laptop (999€)&quot;
// &quot;🎉 Premier ajout : Laptop !&quot; (une seule fois)
boutique.ajouter({ nom: &quot;Souris&quot;,  prix: 29  });
// &quot;+ Ajouté : Souris (29€)&quot;  (once ne se déclenche plus)
boutique.vendre(&quot;Laptop&quot;);
// &quot;- Vendu  : Laptop&quot;
boutique.vendre(&quot;Inconnu&quot;);
// &quot;❌ Erreur : Inconnu introuvable&quot;
console.log(`Stock restant : ${boutique.stock}`); // 1</code></pre>

<h2>Fiche 15.1 — localStorage et sessionStorage</h2>
<h3>🔍 Les deux types de stockage web</h3>
<table><thead>
<tr><th><strong>Durée</strong></th><th>Permanente (jusqu\'à effacement)</th><th>Session courante uniquement</th></tr>
<tr><td><strong>Portée</strong></td><td>Tous les onglets du même domaine</td><td>Onglet courant uniquement</td></tr>
<tr><td><strong>Capacité</strong></td><td>~5 Mo</td><td>~5 Mo</td></tr>
<tr><td><strong>Type</strong></td><td>String uniquement</td><td>String uniquement</td></tr>
</tbody></table>
<p>Les deux ont exactement la même API. La différence est uniquement la durée de vie : <code>sessionStorage</code> est effacé quand on ferme l\'onglet, <code>localStorage</code> persiste indéfiniment.</p>
<h3>📌 API de base</h3>
<pre><code>// Stocker (strings uniquement !)
localStorage.setItem(&quot;theme&quot;, &quot;dark&quot;);
localStorage.setItem(&quot;langue&quot;, &quot;fr&quot;);

// Lire
const theme = localStorage.getItem(&quot;theme&quot;); // &quot;dark&quot;
const vide  = localStorage.getItem(&quot;xyz&quot;);   // null si la clé n\&#x27;existe pas

// Supprimer une entrée
localStorage.removeItem(&quot;langue&quot;);

// Tout effacer
localStorage.clear();

// Nombre d\&#x27;entrées
console.log(localStorage.length); // 1</code></pre>
<h3>📌 Stocker des objets et tableaux</h3>
<p><code>localStorage</code> ne stocke que des strings. Pour stocker des objets ou tableaux, il faut les <strong>sérialiser</strong> avec <code>JSON.stringify</code> et les <strong>désérialiser</strong> avec <code>JSON.parse</code>.</p>
<pre><code>// ❌ Stocker un objet directement — perd la structure !
localStorage.setItem(&quot;user&quot;, { nom: &quot;Alice&quot; });
localStorage.getItem(&quot;user&quot;); // &quot;[object Object]&quot; — inutilisable !

// ✅ Sérialiser en JSON avant de stocker
const user = { nom: &quot;Alice&quot;, age: 25, roles: [&quot;admin&quot;, &quot;user&quot;] };
localStorage.setItem(&quot;user&quot;, JSON.stringify(user));

// Désérialiser à la lecture
const userStocke = JSON.parse(localStorage.getItem(&quot;user&quot;));
console.log(userStocke.nom);   // &quot;Alice&quot;
console.log(userStocke.roles); // [&quot;admin&quot;, &quot;user&quot;]</code></pre>
<h3>📌 Pattern sécurisé avec gestion d\'erreur</h3>
<pre><code>// En mode navigation privée ou si le quota est dépassé,
// localStorage peut lancer une exception. Toujours protéger les accès.

function lireStorage(cle, defaut = null) {
  try {
    const valeur = localStorage.getItem(cle);
    return valeur ? JSON.parse(valeur) : defaut;
  } catch {
    return defaut; // En cas d\&#x27;erreur, retourner la valeur par défaut
  }
}

function ecrireStorage(cle, valeur) {
  try {
    localStorage.setItem(cle, JSON.stringify(valeur));
    return true;
  } catch (err) {
    console.error(&quot;Erreur localStorage:&quot;, err);
    return false;
  }
}

// Utilisation
const prefs = lireStorage(&quot;prefs&quot;, { theme: &quot;light&quot;, langue: &quot;fr&quot; });
ecrireStorage(&quot;prefs&quot;, { ...prefs, theme: &quot;dark&quot; });</code></pre>
<h3>📌 Écouter les changements entre onglets</h3>
<pre><code>// L\&#x27;évènement &quot;storage&quot; est déclenché dans les AUTRES onglets du même domaine
// (pas dans l\&#x27;onglet qui a fait la modification)
window.addEventListener(&quot;storage&quot;, function(event) {
  console.log(`Clé modifiée : ${event.key}`);
  console.log(`Ancienne valeur : ${event.oldValue}`);
  console.log(`Nouvelle valeur : ${event.newValue}`);
});
// Utile pour synchroniser l\&#x27;état entre plusieurs onglets</code></pre>
<h2>Fiche 15.2 — Cookies</h2>
<h3>🔍 Les cookies vs localStorage</h3>
<p>La différence fondamentale : les cookies sont <strong>envoyés au serveur</strong> avec chaque requête HTTP, contrairement à <code>localStorage</code> qui est purement côté client. Les cookies sont utilisés pour l\'authentification, la gestion de sessions, et le suivi.</p>
<h3>📌 Lire et écrire des cookies</h3>
<pre><code>// Écrire un cookie
document.cookie = &quot;theme=dark&quot;;
document.cookie = &quot;theme=dark; max-age=86400&quot;;         // Expire dans 1 jour (secondes)
document.cookie = &quot;theme=dark; path=/&quot;;                // Accessible sur tout le site
document.cookie = &quot;token=abc; secure; samesite=Lax&quot;;  // HTTPS uniquement

// Lire les cookies — tous en une seule string
console.log(document.cookie); // &quot;theme=dark; langue=fr; session=abc123&quot;

// Parser tous les cookies en objet
function obtenirCookies() {
  return Object.fromEntries(
    document.cookie.split(&quot;; &quot;)
      .filter(Boolean)
      .map(c =&gt; c.split(&quot;=&quot;).map(decodeURIComponent))
  );
}

function obtenirCookie(nom) {
  return obtenirCookies()[nom] ?? null;
}

// Supprimer un cookie (en le faisant expirer immédiatement)
document.cookie = &quot;theme=; max-age=0; path=/&quot;;

console.log(obtenirCookie(&quot;theme&quot;)); // &quot;dark&quot;</code></pre>
<h3>📌 Quand utiliser quoi ?</h3>
<pre><code>localStorage    → Préférences utilisateur, cache local, données persistantes
sessionStorage  → État temporaire de navigation, panier d\&#x27;une session
Cookies         → Authentification, sessions (envoyés automatiquement au serveur)
IndexedDB       → Grandes quantités de données structurées (&gt;5Mo, données complexes)</code></pre>
<h2>Fiche 15.3 — Les APIs modernes du navigateur</h2>
<h3>📌 Geolocation API</h3>
<p>L\'API Géolocalisation permet d\'obtenir la position géographique de l\'utilisateur (coordonnées GPS). Elle nécessite une <strong>autorisation explicite</strong> de l\'utilisateur.</p>
<pre><code>if (&quot;geolocation&quot; in navigator) {
  // Obtenir la position une seule fois
  navigator.geolocation.getCurrentPosition(
    function(position) {
      const { latitude, longitude, accuracy } = position.coords;
      console.log(`Lat: ${latitude}, Lon: ${longitude}`);
      console.log(`Précision: ${accuracy} mètres`);
    },
    function(erreur) {
      // Codes d\&#x27;erreur : 1 = refusé, 2 = indisponible, 3 = timeout

        case 1: console.log(&quot;Permission refusée par l\&#x27;utilisateur&quot;); break;
        case 2: console.log(&quot;Position indisponible&quot;); break;
        case 3: console.log(&quot;Timeout&quot;); break;
      }
    },
    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
  );

  // Surveiller la position en temps réel (GPS live)
  const watchId = navigator.geolocation.watchPosition(position =&gt; {

  // Arrêter la surveillance

<h3>📌 Notification API</h3>
<p>L\'API Notifications permet d\'afficher des notifications système en dehors du navigateur, même quand l\'onglet est en arrière-plan.</p>
<pre><code>async function demanderEtNotifier(titre, corps) {
  // Demander la permission (nécessaire une seule fois)
  const permission = await Notification.requestPermission();

  if (permission !== &quot;granted&quot;) {
    console.log(&quot;Permission refusée&quot;);
    return;
  }

  const notif = new Notification(titre, {
    body:              corps,

<h3>📌 IntersectionObserver — Lazy loading et animations au scroll</h3>
<p><code>IntersectionObserver</code> permet d\'observer si un élément est visible dans le viewport (la zone visible de la page), sans avoir à écouter l\'évènement <code>scroll</code> — beaucoup plus performant.</p>

      entry.target.src = entry.target.dataset.src;

    observer.unobserve(entry.target);

  rootMargin: &quot;0px 0px -60px 0px&quot;      // Déclenche 60px avant le bord bas

// Observer tous les éléments lazy

<h2>Fiche 15.4 — Bonnes pratiques JavaScript</h2>
<h3>📌 Nommage clair et conventions</h3>

<h3>📌 Early return — Réduire l\'imbrication</h3>
<p>L\'<strong>early return</strong> (retour anticipé) consiste à retourner ou sortir de la fonction dès qu\'une condition invalide est détectée, plutôt que d\'imbriquer le code valide dans des <code>if</code>. Le résultat est un code "plat" et plus lisible.</p>
<pre><code>// ❌ Imbrication profonde — &quot;pyramide de la mort&quot;

        } else {

        }

  if (commande.articles.length === 0)     return console.log(&quot;Panier vide&quot;);

<h3>📌 Immutabilité — Éviter les mutations surprises</h3>
<p>Certaines méthodes JavaScript <strong>modifient</strong> le tableau ou l\'objet original, d\'autres retournent une <strong>nouvelle copie</strong>. Préférer les méthodes non-mutantes évite les bugs difficiles à tracer.</p>
<pre><code>const original = [3, 1, 4, 1, 5, 9];

// sort, reverse, splice, push, pop, shift, unshift, fill

<h2>Fiche 15.5 — Performance et optimisation</h2>
<h3>📌 Debounce et Throttle</h3>
<p>Deux patterns essentiels pour éviter d\'exécuter trop souvent des fonctions coûteuses déclenchées par des évènements fréquents comme <code>input</code>, <code>scroll</code> ou <code>resize</code>.</p>
<pre><code>// DEBOUNCE — attend la fin de l\&#x27;activité avant d\&#x27;exécuter
// &quot;Attends que l\&#x27;utilisateur ait fini de taper&quot;
// Cas d\&#x27;usage : recherche en temps réel, auto-save, validation à la frappe
function debounce(fn, delai) {
  let timer;
  return function(...args) {
    clearTimeout(timer); // Annule l\&#x27;exécution précédente
    timer = setTimeout(() =&gt; fn.apply(this, args), delai);
  };
}

// THROTTLE — limite à une exécution maximum par période
// &quot;Exécute au maximum toutes les X millisecondes&quot;
// Cas d\&#x27;usage : scroll, resize, mousemove, animations
function throttle(fn, periode) {
  let derniereExecution = 0;
  return function(...args) {
    const maintenant = Date.now();
    if (maintenant - derniereExecution &gt;= periode) {
      derniereExecution = maintenant;
      fn.apply(this, args);
    }
  };
}

// Exemples concrets
const rechercheDebounced = debounce(rechercherAPI, 300);
inputRecherche.addEventListener(&quot;input&quot;, rechercheDebounced);
// rechercherAPI n\&#x27;est appelée que 300ms après la dernière frappe

const handleScrollThrottled = throttle(handleScroll, 100);
window.addEventListener(&quot;scroll&quot;, handleScrollThrottled);
// handleScroll est appelée au maximum toutes les 100ms</code></pre>
<h3>📌 DocumentFragment pour les performances DOM</h3>
<p>Chaque modification du DOM peut déclencher un <strong>reflow</strong> (recalcul de la mise en page). Regrouper les modifications avec un <code>DocumentFragment</code> réduit le nombre de reflows.</p>
<pre><code>const items = [&quot;Pomme&quot;, &quot;Banane&quot;, &quot;Cerise&quot;, &quot;Mangue&quot;, &quot;Kiwi&quot;];

  const li = document.createElement(&quot;li&quot;);
  li.textContent = item;
  liste.appendChild(li); // Reflow à chaque fois !

// ✅ DocumentFragment — un seul reflow final

items.forEach(item =&gt; {
  const li = document.createElement(&quot;li&quot;);
  li.textContent = item;
  fragment.appendChild(li); // Ajout dans le fragment (hors DOM, pas de reflow)

<li><code>reinitialiserPreferences()</code> : remet toutes les préférences aux valeurs par défaut</li>
<li><code>appliquerPreferences()</code> : applique les préférences au DOM (data-theme sur body, fontSize sur html)</li>

<h4>Solution</h4>
<pre><code>// preferences.js
const CLE_PREFS = &quot;app_preferences&quot;;

const DEFAULTS = {
  theme:        &quot;light&quot;,
  langue:       &quot;fr&quot;,
  taillePolice: 16
};

export function lirePreferences() {
  try {
    const stocke = localStorage.getItem(CLE_PREFS);
    // Fusionner avec les defaults pour gérer les nouvelles préférences ajoutées
    return stocke ? { ...DEFAULTS, ...JSON.parse(stocke) } : { ...DEFAULTS };
  } catch {
    return { ...DEFAULTS };
  }
}

export function ecrirePreference(cle, valeur) {
  if (!(cle in DEFAULTS)) {
    throw new Error(`Préférence inconnue : &quot;${cle}&quot;. Valides : ${Object.keys(DEFAULTS).join(&quot;, &quot;)}`);
  }
  const prefs = lirePreferences();
  prefs[cle] = valeur;
  localStorage.setItem(CLE_PREFS, JSON.stringify(prefs));
  return prefs;
}

export function reinitialiserPreferences() {
  localStorage.removeItem(CLE_PREFS);
  return { ...DEFAULTS };
}

  document.body.dataset.langue     = prefs.langue;

<h3>Exercice 15.2 — Animations au scroll avec IntersectionObserver</h3>
<h4>Énoncé</h4>
<p>Crée une fonction <code>initialiserAnimationsScroll()</code> qui anime les éléments <code>.animate-on-scroll</code> quand ils entrent dans le viewport.</p>
<p>Les exigences :</p>
<ul>
<li>Chaque élément reçoit la classe <code>anime</code> quand il devient visible</li>
<li>Les éléments enfants portant l\'attribut <code>data-delay="300"</code> (en ms) s\'animent avec ce délai</li>
<li>L\'animation ne se déclenche qu\'une seule fois par élément</li>
<li>La fonction retourne l\'observer pour permettre de le déconnecter plus tard</li>
</ul>
<p>Bonus : Ajoute une option pour que l\'animation se déclenche à nouveau si l\'élément quitte puis re-entre dans le viewport.</p>
<h4>Solution</h4>
<pre><code>function initialiserAnimationsScroll(options = {}) {
  const {
    uneSeuleFois = true,            // True = anime une seule fois, false = à chaque apparition
    seuil        = 0.15,            // 15% de l\&#x27;élément doit être visible
    margeHaut    = &quot;0px&quot;,
    margeBas     = &quot;-60px&quot;
  } = options;

  const observer = new IntersectionObserver((entries) =&gt; {
    entries.forEach(entry =&gt; {
      if (entry.isIntersecting) {
        // Animer l\&#x27;élément principal
        entry.target.classList.add(&quot;anime&quot;);

        // Animer les enfants avec délais progressifs
        const enfants = entry.target.querySelectorAll(&quot;[data-delay]&quot;);
        enfants.forEach(enfant =&gt; {
          const delai = parseInt(enfant.dataset.delay) || 0;
          setTimeout(() =&gt; enfant.classList.add(&quot;anime&quot;), delai);
        });

        // Observer une seule fois si demandé
        if (uneSeuleFois) observer.unobserve(entry.target);

      } else if (!uneSeuleFois) {
        // Re-préparer pour la prochaine apparition
        entry.target.classList.remove(&quot;anime&quot;);
        entry.target.querySelectorAll(&quot;[data-delay]&quot;).forEach(enfant =&gt; {
          enfant.classList.remove(&quot;anime&quot;);
        });
      }
    });
  }, {
    threshold:  seuil,
    rootMargin: `${margeHaut} 0px ${margeBas} 0px`
  });

  document.querySelectorAll(&quot;.animate-on-scroll&quot;)
    .forEach(el =&gt; observer.observe(el));

  console.log(`Observateur initialisé sur ${document.querySelectorAll(&quot;.animate-on-scroll&quot;).length} éléments`);
  return observer; // Retourner pour pouvoir disconnect() plus tard
}

// Utilisation
document.addEventListener(&quot;DOMContentLoaded&quot;, () =&gt; {
  const observer = initialiserAnimationsScroll({ uneSeuleFois: true });

  // Arrêter quand on n\&#x27;en a plus besoin (ex: avant de quitter la page)
  window.addEventListener(&quot;beforeunload&quot;, () =&gt; observer.disconnect());

<h4>Énoncé</h4>
<p>Crée une classe <code>CacheAPI</code> qui mémorise les résultats de requêtes <code>fetch</code> pendant une durée configurable, évitant de refaire la même requête réseau pendant ce laps de temps.</p>
<p>Exigences :</p>
<ul>
<li>Constructeur <code>CacheAPI(dureeMs)</code> — durée en millisecondes, 5 minutes par défaut</li>
<li>Méthode <code>get(url, options)</code> — retourne les données depuis le cache si disponibles et non expirées, sinon fait la vraie requête et met en cache</li>
<li>Méthode <code>invalider(urlPrefix)</code> — supprime les entrées dont l\'URL commence par le préfixe</li>
<li>Méthode <code>vider()</code> — vide tout le cache</li>
<li>Getter <code>taille</code> — nombre d\'entrées en cache</li>
<li>Afficher <code>[Cache HIT]</code> ou <code>[Cache MISS]</code> dans la console</li>
</ul>
<h4>Solution</h4>
<pre><code>class CacheAPI {
  #cache = new Map();
  #dureeMs;

  constructor(dureeMs = 5 * 60 * 1000) { // 5 minutes par défaut
    this.#dureeMs = dureeMs;
  }

  #estExpire(entree) {
    return Date.now() - entree.timestamp &gt; this.#dureeMs;
  }

  async get(url, options = {}) {
    const cle = `${url}${JSON.stringify(options)}`;

    // Vérifier le cache
    if (this.#cache.has(cle)) {
      const entree = this.#cache.get(cle);
      if (!this.#estExpire(entree)) {
        console.log(`[Cache HIT] ${url}`);
        return entree.donnees;
      }
      // Entrée expirée — supprimer
      this.#cache.delete(cle);
    }

    // Faire la vraie requête
    console.log(`[Cache MISS] ${url}`);
    const reponse = await fetch(url, options);
    if (!reponse.ok) throw new Error(`HTTP ${reponse.status}`);

    const donnees = await reponse.json();
    this.#cache.set(cle, { donnees, timestamp: Date.now() });
    return donnees;
  }

  invalider(urlPrefix) {
    let compte = 0;
    for (const cle of this.#cache.keys()) {
      if (cle.startsWith(urlPrefix)) {
        this.#cache.delete(cle);
        compte++;
      }
    }
    console.log(`${compte} entrée(s) invalidée(s)`);
  }

  vider() {
    const avant = this.#cache.size;
    this.#cache.clear();
    console.log(`Cache vidé (${avant} entrée(s) supprimée(s))`);
  }

  get taille() { return this.#cache.size; }
}

// Utilisation
const cache = new CacheAPI(60_000); // Cache d\&#x27;1 minute

// Première requête — réseau
const users1 = await cache.get(&quot;https://jsonplaceholder.typicode.com/users&quot;);
console.log(cache.taille); // 1

// Deuxième requête — depuis le cache !
const users2 = await cache.get(&quot;https://jsonplaceholder.typicode.com/users&quot;);
// &quot;[Cache HIT]&quot; — pas de requête réseau

console.log(users1 === users2); // true — même référence en mémoire

// Invalider les entrées /users
cache.invalider(&quot;https://jsonplaceholder.typicode.com/users&quot;);
console.log(cache.taille); // 0

// Vider complètement
await cache.get(&quot;https://jsonplaceholder.typicode.com/posts&quot;);
cache.vider(); // &quot;Cache vidé (1 entrée(s) supprimée(s))&quot;</code></pre>

<span class="k">const</span> deep2 <span class="op">=</span> <span class="fn">JSON</span>.<span class="p">parse</span>(<span class="fn">JSON</span>.<span class="p">stringify</span>(original)); <span class="c">// vieux</span>

<span class="c">// Modifier sans muter</span>
<span class="k">const</span> updated <span class="op">=</span> { ...obj, age: <span class="n">26</span> };
<span class="k">const</span> nested  <span class="op">=</span> { ...obj, addr: { ...obj.<span class="p">addr</span>, ville: <span class="s">"Lyon"</span> } };</pre>

<span class="fn">Object</span>.<span class="p">freeze</span>(obj)         <span class="c">// rend immuable (shallow)</span>
<span class="fn">Object</span>.<span class="p">isFrozen</span>(obj)       <span class="c">// vérifie</span>

        </div>
        <pre><span class="c">// Déclaration — hoistée (utilisable avant la ligne)</span>
<span class="k">function</span> <span class="fn">additionner</span>(a, b) { <span class="k">return</span> a <span class="op">+</span> b; }

<span class="c">// Expression — non hoistée</span>
<span class="k">const</span> <span class="fn">additionner</span> <span class="op">=</span> <span class="k">function</span>(a, b) { <span class="k">return</span> a <span class="op">+</span> b; };

<span class="c">// Arrow — syntaxe courte, pas de this propre</span>
<span class="k">const</span> <span class="fn">additionner</span> <span class="op">=</span> (a, b) <span class="op">=></span> a <span class="op">+</span> b;
<span class="k">const</span> <span class="fn">doubler</span>      <span class="op">=</span> n <span class="op">=></span> n <span class="op">*</span> <span class="n">2</span>;  <span class="c">// 1 param sans ()</span>
<span class="k">const</span> <span class="fn">objet</span>        <span class="op">=</span> () <span class="op">=></span> ({ cle: <span class="s">"val"</span> }); <span class="c">// () autour {}</span></pre>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Paramètres avancés</span>

        </div>
        <pre><span class="c">// Valeur par défaut</span>
<span class="k">function</span> <span class="fn">saluer</span>(nom <span class="op">=</span> <span class="s">"monde"</span>) { <span class="k">return</span> <span class="s">`Salut ${nom}`</span>; }
<span class="fn">saluer</span>()           <span class="c">// "Salut monde"</span>

<span class="c">// Rest params</span>
<span class="k">function</span> <span class="fn">somme</span>(...nums) {
  <span class="k">return</span> nums.<span class="p">reduce</span>((a, b) <span class="op">=></span> a <span class="op">+</span> b, <span class="n">0</span>);
}
<span class="fn">somme</span>(<span class="n">1</span>, <span class="n">2</span>, <span class="n">3</span>, <span class="n">4</span>)  <span class="c">// 10</span>

<span class="c">// Options objet (pattern courant)</span>
<span class="k">function</span> <span class="fn">config</span>({ debug <span class="op">=</span> <span class="k">false</span>, timeout <span class="op">=</span> <span class="n">5000</span> } <span class="op">=</span> {}) { }</pre>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Closures</span>
          <button class="copy-btn" onclick="copy(this)">copier</button>
        </div>
        <pre><span class="c">// La fonction interne "se souvient" de son scope de création</span>
<span class="k">function</span> <span class="fn">compteur</span>(init <span class="op">=</span> <span class="n">0</span>) {
  <span class="k">let</span> count <span class="op">=</span> init;
  <span class="k">return</span> {
    <span class="fn">incrementer</span>() { count++; },
    <span class="fn">valeur</span>()      { <span class="k">return</span> count; }
  };
}

<span class="k">const</span> c <span class="op">=</span> <span class="fn">compteur</span>(<span class="n">10</span>);
c.<span class="fn">incrementer</span>();
c.<span class="fn">valeur</span>(); <span class="c">// 11 — count inaccessible directement</span></pre>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">HOF — map / filter / reduce personnalisés</span>
          <button class="copy-btn" onclick="copy(this)">copier</button>
        </div>
        <pre><span class="c">// Fonctions qui prennent/retournent des fonctions</span>
<span class="k">const</span> <span class="fn">multiplier</span> <span class="op">=</span> n <span class="op">=></span> x <span class="op">=></span> x <span class="op">*</span> n;
<span class="k">const</span> doubler  <span class="op">=</span> <span class="fn">multiplier</span>(<span class="n">2</span>);
<span class="k">const</span> tripler  <span class="op">=</span> <span class="fn">multiplier</span>(<span class="n">3</span>);

[<span class="n">1</span>,<span class="n">2</span>,<span class="n">3</span>].<span class="p">map</span>(doubler) <span class="c">// [2, 4, 6]</span>
[<span class="n">1</span>,<span class="n">2</span>,<span class="n">3</span>].<span class="p">map</span>(tripler) <span class="c">// [3, 6, 9]</span>

<span class="c">// Pipeline</span>
<span class="k">const</span> <span class="fn">pipe</span> <span class="op">=</span> (...fns) <span class="op">=></span> x <span class="op">=></span> fns.<span class="p">reduce</span>((v, f) <span class="op">=></span> <span class="fn">f</span>(v), x);</pre>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Debounce & Throttle</span>
          <button class="copy-btn" onclick="copy(this)">copier</button>
        </div>
        <pre><span class="c">// Debounce — attend la fin de l'activité</span>
<span class="k">function</span> <span class="fn">debounce</span>(fn, ms) {
  <span class="k">let</span> timer;
  <span class="k">return</span> (...args) <span class="op">=></span> {
    <span class="fn">clearTimeout</span>(timer);
    timer <span class="op">=</span> <span class="fn">setTimeout</span>(() <span class="op">=></span> fn(...args), ms);
  };
}

<span class="c">// Throttle — max 1 exécution par période</span>
<span class="k">function</span> <span class="fn">throttle</span>(fn, ms) {
  <span class="k">let</span> last <span class="op">=</span> <span class="n">0</span>;
  <span class="k">return</span> (...args) <span class="op">=></span> {
    <span class="k">if</span> (<span class="fn">Date</span>.<span class="p">now</span>() <span class="op">-</span> last <span class="op">>=</span> ms) { last <span class="op">=</span> <span class="fn">Date</span>.<span class="p">now</span>(); fn(...args); }
  };
}</pre>
      </div>

  <section class="section" id="async">
    <div class="section-header">
      <span class="section-icon">⏳</span>
      <h2>Async / Await</h2>
      <span class="section-count">4 fiches</span>

    <div class="cards">

      <div class="card">
        <div class="card-header">
          <span class="card-title">Syntaxe de base</span>
          <button class="copy-btn" onclick="copy(this)">copier</button>
        </div>
        <pre><span class="c">// async → retourne toujours une Promise</span>
<span class="k">async function</span> <span class="fn">charger</span>() {
  <span class="k">try</span> {
    <span class="k">const</span> user <span class="op">=</span> <span class="k">await</span> <span class="fn">obtenirUser</span>(<span class="n">1</span>);  <span class="c">// suspend ici</span>
    <span class="k">const</span> posts <span class="op">=</span> <span class="k">await</span> <span class="fn">obtenirPosts</span>(user.<span class="p">id</span>);
    <span class="k">return</span> { user, posts };
  } <span class="k">catch</span> (err) {
    console.<span class="p">error</span>(err);
    <span class="k">throw</span> err;
  } <span class="k">finally</span> {
    console.<span class="p">log</span>(<span class="s">"Terminé"</span>);
  }
}</pre>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Séquentiel vs Parallèle</span>
          <button class="copy-btn" onclick="copy(this)">copier</button>
        </div>
        <pre><span class="c">// ❌ Séquentiel — lent (2s si chaque = 1s)</span>
<span class="k">const</span> a <span class="op">=</span> <span class="k">await</span> <span class="fn">fetch1</span>();
<span class="k">const</span> b <span class="op">=</span> <span class="k">await</span> <span class="fn">fetch2</span>();

<span class="c">// ✅ Parallèle — rapide (1s max)</span>
<span class="k">const</span> [a, b] <span class="op">=</span> <span class="k">await</span> <span class="fn">Promise</span>.<span class="p">all</span>([<span class="fn">fetch1</span>(), <span class="fn">fetch2</span>()]);

<span class="c">// ⚠️ forEach ne marche PAS avec await !</span>
ids.<span class="p">forEach</span>(<span class="k">async</span> id <span class="op">=></span> <span class="k">await</span> <span class="fn">fetch</span>(id)); <span class="c">// ← piège !</span>

<span class="c">// ✅ Boucle séquentielle</span>
<span class="k">for</span> (<span class="k">const</span> id <span class="k">of</span> ids) { <span class="k">const</span> r <span class="op">=</span> <span class="k">await</span> <span class="fn">fetch</span>(id); }</pre>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Promise.all / allSettled / race / any</span>
          <button class="copy-btn" onclick="copy(this)">copier</button>
        </div>
        <pre><span class="c">// all    — toutes doivent réussir</span>
<span class="k">const</span> [a,b] <span class="op">=</span> <span class="k">await</span> <span class="fn">Promise</span>.<span class="p">all</span>([p1, p2]);

<span class="c">// allSettled — attend toutes, succès ou non</span>
<span class="k">const</span> res <span class="op">=</span> <span class="k">await</span> <span class="fn">Promise</span>.<span class="p">allSettled</span>([p1, p2]);
res.<span class="p">forEach</span>(r <span class="op">=></span> {
  <span class="k">if</span> (r.<span class="p">status</span> <span class="op">===</span> <span class="s">"fulfilled"</span>) <span class="fn">ok</span>(r.<span class="p">value</span>);
  <span class="k">else</span> <span class="fn">ko</span>(r.<span class="p">reason</span>);
});

<span class="c">// race   — 1re réglée (succès ou erreur)</span>
<span class="c">// any    — 1re réussie</span></pre>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">AbortController — timeout / annulation</span>

<span class="fn">setTimeout</span>(() <span class="op">=></span> ctrl.<span class="p">abort</span>(), <span class="n">5000</span>); <span class="c">// timeout 5s</span>

<span class="k">try</span> {
  <span class="k">const</span> r <span class="op">=</span> <span class="k">await</span> <span class="fn">fetch</span>(url, { signal: ctrl.<span class="p">signal</span> });
} <span class="k">catch</span> (err) {
  <span class="k">if</span> (err.<span class="p">name</span> <span class="op">===</span> <span class="s">"AbortError"</span>) console.<span class="p">log</span>(<span class="s">"Annulé"</span>);
  <span class="k">else</span> <span class="k">throw</span> err;
}

<span class="c">// Annuler plusieurs listeners d'un coup</span>
btn.<span class="p">addEventListener</span>(<span class="s">"click"</span>, fn, { signal: ctrl.<span class="p">signal</span> });
ctrl.<span class="p">abort</span>(); <span class="c">// supprime tous les listeners !</span></pre>

  <section class="section" id="fetch">
    <div class="section-header">
      <span class="section-icon">🌐</span>
      <h2>Fetch — Requêtes HTTP</h2>
      <span class="section-count">3 fiches</span>
    </div>
    <div class="cards">

      <div class="card">
        <div class="card-header">
          <span class="card-title">GET / POST / PATCH / DELETE</span>
          <button class="copy-btn" onclick="copy(this)">copier</button>
        </div>
        <pre><span class="c">// GET</span>
<span class="k">const</span> r <span class="op">=</span> <span class="k">await</span> <span class="fn">fetch</span>(<span class="s">"/api/users"</span>);
<span class="k">if</span> (!r.<span class="p">ok</span>) <span class="k">throw</span> <span class="k">new</span> <span class="fn">Error</span>(<span class="s">`HTTP ${r.status}`</span>);
<span class="k">const</span> data <span class="op">=</span> <span class="k">await</span> r.<span class="p">json</span>();

<span class="c">// POST</span>
<span class="k">await</span> <span class="fn">fetch</span>(<span class="s">"/api/users"</span>, {
  method: <span class="s">"POST"</span>,
  headers: { <span class="s">"Content-Type"</span>: <span class="s">"application/json"</span> },
  body: <span class="fn">JSON</span>.<span class="p">stringify</span>({ nom: <span class="s">"Alice"</span> })
});

<span class="c">// PATCH · PUT · DELETE : même schéma, changer method</span></pre>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Piège fetch + codes HTTP</span>
          <button class="copy-btn" onclick="copy(this)">copier</button>
        </div>
        <pre><span class="c">// ⚠️ fetch ne rejette PAS sur 404 ou 500 !</span>
<span class="c">// Toujours vérifier r.ok ou r.status</span>

<span class="c">// 200 OK · 201 Created · 204 No Content</span>
<span class="c">// 400 Bad Request · 401 Unauth · 403 Forbidden</span>
<span class="c">// 404 Not Found · 422 Unprocessable · 500 Server Error</span>

<span class="c">// Lire la réponse</span>
<span class="k">await</span> r.<span class="p">json</span>()        <span class="c">// objet JS (le plus courant)</span>
<span class="k">await</span> r.<span class="p">text</span>()        <span class="c">// string</span>
<span class="k">await</span> r.<span class="p">blob</span>()        <span class="c">// fichier/image</span>
r.<span class="p">ok</span> / r.<span class="p">status</span> / r.<span class="p">headers</span></pre>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Client API réutilisable</span>
          <button class="copy-btn" onclick="copy(this)">copier</button>
        </div>
        <pre><span class="k">class</span> <span class="fn">Api</span> {
  <span class="fn">constructor</span>(base, token) { <span class="k">this</span>.<span class="p">base</span><span class="op">=</span>base; <span class="k">this</span>.<span class="p">token</span><span class="op">=</span>token; }

  <span class="k">async</span> <span class="fn">req</span>(path, opts <span class="op">=</span> {}) {
    <span class="k">const</span> r <span class="op">=</span> <span class="k">await</span> <span class="fn">fetch</span>(<span class="k">this</span>.<span class="p">base</span> <span class="op">+</span> path, {
      headers: { <span class="s">"Content-Type"</span>:<span class="s">"application/json"</span>,
        ...(<span class="k">this</span>.<span class="p">token</span> <span class="op">&&</span> { Authorization: <span class="s">`Bearer ${this.token}`</span>}) },
      ...opts, body: opts.<span class="p">body</span> ? <span class="fn">JSON</span>.<span class="p">stringify</span>(opts.<span class="p">body</span>) : <span class="k">undefined</span>
    });
    <span class="k">if</span> (!r.<span class="p">ok</span>) <span class="k">throw</span> <span class="k">new</span> <span class="fn">Error</span>(r.<span class="p">status</span>);

<script>

for(i=1;i<=15;i++) M[i]=document.getElementById("m"+i).textContent;

var INFO=[

 [5, "Tableaux","map, filter, reduce, sort","\ud83d\udccb"],

 [7, "Nombres \u0026 Dates","Number, Math, Date","\ud83d\udd22"],

 [9, "\u00c9v\u00e8nements","Listeners, d\u00e9l\u00e9gation","\ud83c\udfaf"],

];

var TAB="home", MID=1;

/* navigate */
function go(tab,mid){
  TAB=tab;
  if(mid!=null) MID=mid;
  document.querySelectorAll(".tab").forEach(function(b){
    b.classList.toggle("on", b.dataset.tab===tab);
  });
  sidebar();
  content();
  document.getElementById("ct").scrollTop=0;
}

/* sidebar */
function sidebar(){
  var sb=document.getElementById("sb");
  if(TAB==="home"||TAB==="projets"){sb.style.display="none";return;}
  sb.style.display="flex";
  sb.innerHTML="";

  if(TAB==="modules"){
    addSec(sb,"// 15 modules");
    INFO.forEach(function(m){
      var d=el("div","sb-link"+(MID===m[0]?" on":""));
      d.dataset.mid=m[0];
      var sp=el("span","sb-num"); sp.textContent=pad(m[0]); d.appendChild(sp);
      var st=el("span"); st.textContent=m[1]; d.appendChild(st);
      d.addEventListener("click",function(){ go("modules",+this.dataset.mid); });
      sb.appendChild(d);
    });
  }

  if(TAB==="cheatsheet"){
    var secs=[
      ["// Fondamentaux",[["variables","Variables \u0026 Types"],["operateurs","Op\u00e9rateurs modernes"],["strings","String"],["numbers","Number \u0026 Math"]]],
      ["// Collections",[["arrays","Array"],["objects","Object"],["destructuring","Destructuration"]]],
      ["// Fonctions",[["fonctions","Fonctions"],["async","Async / Await"],["fetch","Fetch"]]],
      ["// Classes \u0026 DOM",[["classes","Classes"],["dom","DOM"],["events","\u00c9v\u00e8nements"],["storage","Storage"]]],
      ["// Patterns",[["patterns","Patterns utiles"]]]
    ];
    secs.forEach(function(s){
      addSec(sb,s[0]);
      s[1].forEach(function(p){
        var d=el("div","sb-link"); d.dataset.scroll=p[0]; d.textContent=p[1];
        d.addEventListener("click",function(){
          var t=document.getElementById(this.dataset.scroll);
          if(t) document.getElementById("ct").scrollTo({top:t.offsetTop-20,behavior:"smooth"});
        });
        sb.appendChild(d);
      });
    });
  }
}

/* content */
function content(){
  var ct=document.getElementById("ct");
  ct.innerHTML="";
  if(TAB==="home")       buildHome(ct);
  if(TAB==="modules")    buildModule(ct,MID);
  if(TAB==="cheatsheet") buildCS(ct);
  if(TAB==="projets")    buildProj(ct);
}

/* HOME */
function buildHome(ct){
  var hero=el("div","hero");
  var ey=el("p","ey"); ey.textContent="// BTS SIO SLAM \u2014 JavaScript"; hero.appendChild(ey);
  var h1=el("h1"); h1.innerHTML="Cours complet<br><em>JavaScript</em>"; hero.appendChild(h1);
  var p=el("p"); p.textContent="15 modules, une cheatsheet interactive et 12 projets GitHub."; hero.appendChild(p);
  ct.appendChild(hero);

  var cta=el("div","cta");
  var b1=el("button","btn btn-p"); b1.textContent="\ud83d\udcda Commencer le cours";
  b1.addEventListener("click",function(){ go("modules",1); }); cta.appendChild(b1);
  var b2=el("button","btn"); b2.textContent="\u26a1 Cheatsheet";
  b2.addEventListener("click",function(){ go("cheatsheet"); }); cta.appendChild(b2);
  var b3=el("button","btn"); b3.textContent="\ud83d\ude80 Projets GitHub";
  b3.addEventListener("click",function(){ go("projets"); }); cta.appendChild(b3);

  lbl.textContent="// 15 modules"; ct.appendChild(lbl);

  var grid=el("div","hgrid"); ct.appendChild(grid);
  INFO.forEach(function(m){
    var c=el("div","hcard"); c.dataset.mid=m[0];
    var n=el("div","hcard-n"); n.textContent="MODULE "+pad(m[0]); c.appendChild(n);
    var h=el("h3"); h.textContent=m[3]+" "+m[1]; c.appendChild(h);

    grid.appendChild(c);

}

/* MODULE */
function buildModule(ct,id){
  ct.appendChild(navBar(id,true));
  var mc=el("div","mc");
  mc.innerHTML=M[id];
  ct.appendChild(mc);
  ct.appendChild(navBar(id,false));
  /* copy buttons on hover */
  mc.querySelectorAll("pre").forEach(function(pre){
    pre.style.position="relative";
    var btn=el("button","cpb"); btn.textContent="\ud83d\udccb"; btn.title="Copier";
    btn.addEventListener("click",function(){
      navigator.clipboard.writeText((pre.innerText||pre.textContent).trim()).then(function(){
        btn.textContent="\u2713"; btn.style.color="var(--green)"; btn.style.borderColor="var(--green)";
        setTimeout(function(){ btn.textContent="\ud83d\udccb"; btn.style.color=""; btn.style.borderColor=""; },1500);
      }).catch(function(){});
    });
    pre.appendChild(btn);
  });
}

function navBar(id,top){
  var prev=id>1?INFO[id-2]:null, next=id<15?INFO[id]:null;
  var wrap=el("div","mnav");
  if(!top) wrap.style.cssText="margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border)";
  var bp=el("button","btn");
  if(!prev){ bp.disabled=true; }
  else { bp.textContent="\u2190 "+prev[1]; bp.dataset.mid=id-1;
    bp.addEventListener("click",function(){ go("modules",+this.dataset.mid); document.getElementById("ct").scrollTop=0; }); }
  wrap.appendChild(bp);
  var bm=el("span","badge-mod"); bm.textContent="MODULE "+pad(id)+" / 15"; wrap.appendChild(bm);
  var bn=el("button","btn");
  if(!next){ bn.disabled=true; }
  else { bn.textContent=next[1]+" \u2192"; bn.dataset.mid=id+1;
    bn.addEventListener("click",function(){ go("modules",+this.dataset.mid); document.getElementById("ct").scrollTop=0; }); }
  wrap.appendChild(bn);
  return wrap;
}

/* CHEATSHEET */
function buildCS(ct){
  var head=el("div","cs-head");
  var ey=el("p","ey"); ey.textContent="// m\u00e9mo rapide"; head.appendChild(ey);
  var h2=el("h2"); h2.innerHTML="JavaScript <span>Cheatsheet</span>"; head.appendChild(h2);
  ct.appendChild(head);

  var sw=el("div","sw");
  var ico=el("span","sico"); ico.textContent="\ud83d\udd0d"; sw.appendChild(ico);
  var inp=el("input","si"); inp.id="cs-search"; inp.type="text";
  inp.placeholder="Rechercher une m\u00e9thode, un pattern..."; inp.autocomplete="off";
  inp.addEventListener("input",function(){
    var q=this.value.toLowerCase().trim();
    ct.querySelectorAll(".card").forEach(function(c){
      c.classList.toggle("hidden", q!==""&&!c.textContent.toLowerCase().includes(q));
    });
    ct.querySelectorAll(".section").forEach(function(s){
      s.classList.toggle("all-hidden", q!==""&&!s.querySelector(".card:not(.hidden)"));
    });
  });
  sw.appendChild(inp);
  ct.appendChild(sw);

  var wrap=el("div"); wrap.innerHTML=CS; ct.appendChild(wrap);

  /* sidebar highlight on scroll */
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(!e.isIntersecting) return;
      document.querySelectorAll("#sb .sb-link").forEach(function(a){
        a.classList.toggle("on", a.dataset.scroll===e.target.id);
      });
    });
  },{root:ct,rootMargin:"-15% 0px -60% 0px"});
  ct.querySelectorAll(".section[id]").forEach(function(s){ obs.observe(s); });
}

/* copy() called by existing onclick="copy(this)" in cheatsheet cards */
function copy(btn){
  var pre=btn.closest(".card").querySelector("pre");
  navigator.clipboard.writeText(pre.innerText||pre.textContent).then(function(){
    btn.textContent="\u2713 copi\u00e9"; btn.classList.add("copied");
    setTimeout(function(){ btn.textContent="copier"; btn.classList.remove("copied"); },1500);
  }).catch(function(){});
}

      if(p.tags && p.tags.length){
        var tags=el("div"); tags.style.cssText="display:flex;flex-wrap:wrap;gap:.32rem";
        p.tags.forEach(function(t){
          var sp=el("span"); sp.style.cssText="font-family:var(--mono);font-size:.63rem;background:var(--s2);color:var(--muted);padding:.18rem .48rem;border-radius:2px;border:1px solid var(--border)";
          sp.textContent=t; tags.appendChild(sp);
        }); body.appendChild(tags);
      }

      card.appendChild(body);

      /* icon */
      if(p.icon){
        var ico=el("div"); ico.style.cssText="font-size:2rem;align-self:start;opacity:.72"; ico.textContent=p.icon;
        card.appendChild(ico);
      }
      grid.appendChild(card);
    });
    ct.appendChild(grid);
  });

  /* tips */
  var tips=el("div"); tips.style.cssText="background:var(--surface);border:1px solid var(--border);padding:1.75rem;margin-bottom:3rem";
  var th=el("h3"); th.style.cssText="font-size:.9rem;font-weight:700;margin-bottom:1.25rem;color:var(--text)";
  th.textContent="\ud83d\udca1 Conseils pour ton GitHub"; tips.appendChild(th);
  var tgrid=el("div"); tgrid.style.cssText="display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1.5rem";
  [
    ["README.md","Toujours inclure un README avec screenshot, démo live et instructions d'installation."],
    ["GitHub Pages","Active GitHub Pages pour avoir un lien de démo directement cliquable."],
    ["Commits","Fais des commits réguliers avec des messages clairs — montre ta progression."],
    ["Ordre recommand\u00e9","Quiz \u2192 Password \u2192 M\u00e9t\u00e9o \u2192 Films \u2192 Todo (meilleur ratio effort/impact)."]
  ].forEach(function(tip){
    var td=el("div");
    var tk=el("div"); tk.style.cssText="font-family:var(--mono);font-size:.72rem;color:var(--accent);margin-bottom:.4rem"; tk.textContent=tip[0]; td.appendChild(tk);
    var tv=el("div"); tv.style.cssText="font-size:.84rem;color:#909080;line-height:1.6"; tv.textContent=tip[1]; td.appendChild(tv);
    tgrid.appendChild(td);
  });
  tips.appendChild(tgrid); ct.appendChild(tips);
}

/* utils */
function el(tag,cls){
  var e=document.createElement(tag);
  if(cls) e.className=cls;
  return e;
}
function addSec(parent,txt){
  var d=el("div","sb-sec"); d.textContent=txt; parent.appendChild(d);
}
function pad(n){ return String(n).padStart(2,"0"); }

/* tabs */
document.querySelectorAll(".tab").forEach(function(b){
  b.addEventListener("click",function(){
    go(b.dataset.tab, b.dataset.tab==="modules"?MID:null);
  });
});

go("home");

</script>
</body>
</html>
